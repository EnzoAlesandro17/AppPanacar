{% extends "base.html" %}

{% block content %}
<h1>{{ 'Editar estado' if accion == 'editar' else 'Nuevo estado' }}</h1>
<form method="post" class="form-card">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>Nombre
        <input type="text" name="name" value="{{ estado.name or '' if estado else '' }}" required>
    </label>
    <button type="submit" class="btn btn-primary">Guardar</button>
</form>

{% if borrado_existente_id %}
<form method="post" action="{{ url_for('claim_statuses.reactivar', id_estado=borrado_existente_id) }}" class="form-card">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <button type="submit" class="btn btn-success">Reactivar el estado existente</button>
</form>
{% endif %}
{% endblock %}
