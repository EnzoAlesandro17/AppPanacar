{% extends "base.html" %}

{% block content %}
<h1>{{ 'Editar estado' if accion == 'editar' else 'Nuevo estado' }}</h1>
<form method="post" class="form-card">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>Nombre
        <input type="text" name="name" value="{{ estado.name or '' if estado else '' }}" required>
    </label>
    <button type="submit" class="btn btn-primary">Guardar</button>
</form>
{% endblock %}
