{% extends "base.html" %}

{% block content %}
<h1>Estados de siniestro borrados</h1>
<table>
    <thead>
        <tr>
            <th>Nombre</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        {% for estado in estados %}
        <tr>
            <td>{{ estado['name'] }}</td>
            <td>
                <form method="post" action="{{ url_for('claim_statuses.reactivar', id_estado=estado['id']) }}" style="display:inline">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <button type="submit" class="btn btn-success">Reactivar</button>
                </form>
            </td>
        </tr>
        {% else %}
        <tr><td colspan="2">No hay estados borrados.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
