{% extends "base.html" %}

{% block content %}
<h1>Marcas de vehículos</h1>
<p class="acciones">
    <a class="btn btn-secondary" href="{{ url_for('vehicle_brands.nuevo') }}">+ Nueva marca</a>
    <a class="btn btn-secondary" href="{{ url_for('vehicle_brands.borrados') }}">Ver borradas</a>
</p>
<table>
    <thead>
        <tr>
            <th>Nombre</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        {% for marca in marcas %}
        <tr>
            <td>{{ marca['name'] }}</td>
            <td>
                <a href="{{ url_for('vehicle_brands.editar', id_marca=marca['id']) }}">Editar</a>
                <form method="post" action="{{ url_for('vehicle_brands.borrar', id_marca=marca['id']) }}"
                      onsubmit="return confirm('¿Borrar la marca {{ marca['name'] }}?');" style="display:inline">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <button type="submit" class="btn btn-danger">Borrar</button>
                </form>
            </td>
        </tr>
        {% else %}
        <tr><td colspan="2">No hay marcas cargadas.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
