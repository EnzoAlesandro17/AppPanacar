{% extends "base.html" %}

{% block content %}
<h1>Iniciar sesión</h1>
<form method="post">
    <label>Usuario
        <input type="text" name="username" required autofocus>
    </label>
    <label>Contraseña
        <input type="password" name="password">
    </label>
    <button type="submit">Entrar</button>
</form>
{% endblock %}
