{% extends "base.html" %}

{% block content %}
<h1>{{ 'Editar producto' if accion == 'editar' else 'Nuevo producto' }}</h1>
<form method="post">
    <label>Código
        <input type="text" name="code" value="{{ producto.code or '' if producto else '' }}" required>
    </label>
    <label>Nombre
        <input type="text" name="name" value="{{ producto.name or '' if producto else '' }}" required>
    </label>
    <label>Categoría
        <input type="text" name="category" value="{{ producto.category or '' if producto else '' }}" required>
    </label>
    <label>Marca
        <input type="text" name="brand" value="{{ producto.brand or '' if producto else '' }}" required>
    </label>
    <label>Descripción
        <input type="text" name="description" value="{{ producto.description or '' if producto else '' }}" required>
    </label>
    <label>Stock (vacío si no aplica, ej: E-SIM)
        <input type="number" name="stock" min="0" step="1" value="{{ producto.stock if producto and producto.stock is not none else '' }}">
    </label>
    <label>Precio mayorista
        <input type="number" name="wholesale_price" min="0" step="0.01" value="{{ producto.wholesale_price if producto and producto.wholesale_price is not none else '' }}" required>
    </label>
    <label>Precio minorista
        <input type="number" name="retail_price" min="0" step="0.01" value="{{ producto.retail_price if producto and producto.retail_price is not none else '' }}" required>
    </label>
    <button type="submit">Guardar</button>
</form>
<p><a href="{{ url_for('products.listar') }}">Volver</a></p>
{% endblock %}
