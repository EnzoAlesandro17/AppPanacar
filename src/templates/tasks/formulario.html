{% extends "base.html" %}

{% block content %}
<h1>Nueva tarea</h1>
<p class="leyenda-obligatorio"><span class="obligatorio">*</span> Campo obligatorio</p>
<form method="post" class="form-card">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>Título <span class="obligatorio">*</span>
        <input type="text" name="title" value="{{ title or '' }}" required>
    </label>
    <label>Descripción
        <textarea name="description">{{ description or '' }}</textarea>
    </label>
    <fieldset class="checklist-sucursales">
        <legend>Sucursales (opcional)</legend>
        {% for sucursal in sucursales %}
        <label class="checklist-item">
            <input type="checkbox" name="branch_ids" value="{{ sucursal['id'] }}" {{ 'checked' if sucursal['id'] in sucursales_seleccionadas else '' }}>
            {{ sucursal['name'] }}
        </label>
        {% endfor %}
    </fieldset>
    <fieldset class="checklist-sucursales">
        <legend>Asignar a (opcional)</legend>
        {% for usuario in usuarios %}
        <label class="checklist-item">
            <input type="checkbox" name="assignee_ids" value="{{ usuario['id'] }}" {{ 'checked' if usuario['id'] in asignados_seleccionados else '' }}>
            {{ usuario['username'] }}
        </label>
        {% endfor %}
    </fieldset>
    <button type="submit" class="btn btn-primary">Crear tarea</button>
</form>
{% endblock %}
