{% extends "base.html" %}

{% block content %}
<h1>Links útiles borrados</h1>
<table>
    <thead>
        <tr>
            <th>Texto</th>
            <th>Observaciones</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        {% for enlace in enlaces %}
        <tr>
            <td>{{ enlace['label'] }}</td>
            <td>{{ enlace['observations'] or '—' }}</td>
            <td>
                <form method="post" action="{{ url_for('informacion_util.reactivar', id_enlace=enlace['id']) }}" style="display:inline">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <button type="submit" class="btn btn-success">Reactivar</button>
                </form>
            </td>
        </tr>
        {% else %}
        <tr><td colspan="3">No hay enlaces borrados.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
