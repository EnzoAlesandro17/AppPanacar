{% extends "base.html" %}

{% block content %}
<h1>{{ 'Editar compañía' if accion == 'editar' else 'Nueva compañía' }}</h1>
<form method="post" class="form-card">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>Nombre
        <input type="text" name="name" value="{{ aseguradora.name or '' if aseguradora else '' }}" required>
    </label>
    <button type="submit" class="btn btn-primary">Guardar</button>
    <button type="button" class="btn btn-secondary" data-cancelar>Cancelar</button>
</form>

{% if borrado_existente_id %}
<form method="post" action="{{ url_for('insurance_companies.reactivar', id_aseguradora=borrado_existente_id) }}" class="form-card">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <button type="submit" class="btn btn-success">Reactivar la compañía existente</button>
</form>
{% endif %}
{% endblock %}
