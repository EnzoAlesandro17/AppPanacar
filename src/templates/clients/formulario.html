{% extends "base.html" %}

{% block content %}
<h1>{{ 'Editar cliente' if accion == 'editar' else 'Nuevo cliente' }}</h1>
<p class="leyenda-obligatorio"><span class="obligatorio">*</span> Campo obligatorio</p>
<form method="post" class="form-card">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>Nombre <span class="obligatorio">*</span>
        <input type="text" name="name" value="{{ cliente.name or '' if cliente else '' }}" required>
    </label>
    <label>Apellido <span class="obligatorio">*</span>
        <input type="text" name="last_name" value="{{ cliente.last_name or '' if cliente else '' }}" required>
    </label>
    <label>DNI/CUIT <span class="obligatorio">*</span>
        <input type="text" name="dni_cuit" value="{{ cliente.dni_cuit or '' if cliente else '' }}" required>
    </label>
    <label>Teléfono
        <input type="text" name="phone" value="{{ cliente.phone or '' if cliente else '' }}">
    </label>
    <label>Email
        <input type="email" name="email" value="{{ cliente.email or '' if cliente else '' }}">
    </label>
    <fieldset class="checklist-sucursales">
        <legend>Sucursales (una o varias, opcional)</legend>
        {% for sucursal in sucursales %}
        <label class="checklist-item">
            <input type="checkbox" name="branch_ids" value="{{ sucursal['id'] }}" {{ 'checked' if sucursal['id'] in sucursales_seleccionadas else '' }}>
            {{ sucursal['name'] }}
        </label>
        {% endfor %}
    </fieldset>
    <button type="submit" class="btn btn-primary">Guardar</button>
</form>

{% if borrado_existente_id %}
<form method="post" action="{{ url_for('clients.reactivar', id_cliente=borrado_existente_id) }}" class="form-card">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <button type="submit" class="btn btn-success">Reactivar el cliente existente</button>
</form>
{% endif %}
{% endblock %}
