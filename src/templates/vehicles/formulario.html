{% extends "base.html" %}

{% block content %}
<h1>{{ 'Editar vehículo' if accion == 'editar' else 'Nuevo vehículo' }}</h1>
<p class="leyenda-obligatorio"><span class="obligatorio">*</span> Campo obligatorio</p>
<form method="post" class="form-card">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>Marca <span class="obligatorio">*</span>
        <select name="brand_id" required>
            <option value="">— Elegir —</option>
            {% for marca in marcas %}
            <option value="{{ marca['id'] }}" {{ 'selected' if vehiculo and vehiculo.brand_id == marca['id'] else '' }}>
                {{ marca['name'] }}
            </option>
            {% endfor %}
        </select>
    </label>
    <label>Modelo <span class="obligatorio">*</span>
        <input type="text" name="model" value="{{ vehiculo.model or '' if vehiculo else '' }}" required>
    </label>
    <label>Año <span class="obligatorio">*</span>
        <input type="number" name="year" min="1900" step="1" value="{{ vehiculo.year or '' if vehiculo else '' }}" required>
    </label>
    <label>Dominio <span class="obligatorio">*</span>
        <input type="text" name="license_plate" value="{{ vehiculo.license_plate or '' if vehiculo else '' }}" required>
    </label>
    <label>Color
        <input type="text" name="color" value="{{ vehiculo.color or '' if vehiculo else '' }}">
    </label>
    <label>Número de chasis
        <input type="text" name="chassis_number" value="{{ vehiculo.chassis_number or '' if vehiculo else '' }}">
    </label>
    <label>Número de motor
        <input type="text" name="engine_number" value="{{ vehiculo.engine_number or '' if vehiculo else '' }}">
    </label>
    <fieldset class="checklist-sucursales">
        <legend>Sucursales (una o varias, opcional)</legend>
        {% for sucursal in sucursales %}
        <label class="checklist-item">
            <input type="checkbox" name="branch_ids" value="{{ sucursal['id'] }}" {{ 'checked' if sucursal['id'] in sucursales_seleccionadas else '' }}>
            {{ sucursal['name'] }}
        </label>
        {% endfor %}
    </fieldset>
    <button type="submit" class="btn btn-primary">Guardar</button>
    <button type="button" class="btn btn-secondary" data-cancelar>Cancelar</button>
</form>

{% if borrado_existente_id %}
<form method="post" action="{{ url_for('vehicles.reactivar', id_vehiculo=borrado_existente_id) }}" class="form-card">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <button type="submit" class="btn btn-success">Reactivar el vehículo existente</button>
</form>
{% endif %}
{% endblock %}
